name: fitsmart_app
description: FitSmart AI — Your AI-Powered Fitness & Nutrition Companion
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.10.4 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # Local Database
  drift: ^2.22.1
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.26

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.0
  cloud_firestore: ^5.4.0
  firebase_analytics: ^11.3.0
  firebase_crashlytics: ^4.1.0

  # AI / Networking
  google_generative_ai: ^0.4.6
  google_sign_in: ^6.2.2
  connectivity_plus: ^6.1.1

  # On-device LLM (Gemma 2 2B via MediaPipe)
  flutter_mediapipe_chat: ^1.0.0
  path_provider: ^2.1.5
  http: ^1.2.2

  # Image Handling
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0
  cached_network_image: ^3.4.1

  # Animations
  flutter_animate: ^4.5.0
  animations: ^2.0.11   # Material Motion (SharedAxis page transitions)

  # Charts
  fl_chart: ^0.69.0

  # Utilities
  crypto: ^3.0.7
  intl: ^0.19.0
  shared_preferences: ^2.3.4

  # Notifications
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  flutter_timezone: ^3.0.0

  # Barcode
  mobile_scanner: ^5.2.3

  # Health Integration
  health: ^12.2.0

  # Growth — Sprint 3
  app_links: ^6.3.3
  screenshot: ^3.0.0
  share_plus: ^10.0.3
  firebase_storage: ^12.3.6

  # Platform Extensions — Sprint 5
  home_widget: ^0.7.0
  archive: ^4.0.9

  # UI
  shimmer: ^3.0.0
  in_app_review: ^2.0.9
  flutter_screenutil: ^5.9.3

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  drift_dev: ^2.22.1
  build_runner: ^2.4.13
  mockito: ^5.4.4
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.6

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "icon.png"
  adaptive_icon_background: "#0A0A0C"
  adaptive_icon_foreground: "icon.png"

flutter_native_splash:
  color: "#0A0A0C"
  image: "icon.png"
  android: true
  ios: false
  android_12:
    color: "#0A0A0C"
    image: "icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/animations/
    - assets/images/
    - assets/data/

  fonts:
    # Single global typeface — Google Sans Flex (variable font).
    # Drop GoogleSansFlex.ttf into assets/fonts/ — one variable file
    # serves every weight via Flutter's font-shape-axis matching.
    - family: GoogleSansFlex
      fonts:
        - asset: assets/fonts/GoogleSansFlex.ttf
          weight: 400
        - asset: assets/fonts/GoogleSansFlex.ttf
          weight: 500
        - asset: assets/fonts/GoogleSansFlex.ttf
          weight: 600
        - asset: assets/fonts/GoogleSansFlex.ttf
          weight: 700
        - asset: assets/fonts/GoogleSansFlex.ttf
          weight: 800
    - family: NotoColorEmoji
      fonts:
        - asset: assets/fonts/NotoColorEmoji.ttf
